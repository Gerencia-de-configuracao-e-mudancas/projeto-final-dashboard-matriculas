</head>
<body class="bg-gray-800 font-sans leading-normal tracking-normal">
  <div class="flex h-screen">

    <aside class="w-64 bg-gray-900 text-gray-200">
      <div class="p-4 text-2xl font-bold">
        IFPB - 4º Ano
      </div>
      <nav class="mt-8">
        <a href="index.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700 hover:text-white">
          Dashboard
        </a>
        <a href="alunos.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700 hover:text-white">

        <a href="cursos.html" class="block py-2.5 px-4 rounded transition duration-200 bg-gray-700 text-white">

        <div></div>
        <div>
          <button class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">Sign out</button>
        </div>
      </header>

      <!-- Main -->
      <main class="flex-1 overflow-y-auto p-8 bg-gray-100">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-8">

          <div class="mb-4">

            </button>

          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
                  <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                <tr>
                  <td class="px-6 py-4 whitespace-nowrap">ADS</td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex gap-2">
                      <button class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">Editar</button>
                      <button class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded">Remover</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td class="px-6 py-4 whitespace-nowrap">ADS2</td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex gap-2">
                      <button class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">Editar</button>
                      <button class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded">Remover</button>
                    </div>
                  </td>
                </tr>
                <!-- Adicione mais cursos aqui -->
              </tbody>
