<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Cidades - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">IFPB - 4º Ano</div>
      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="alunos.html">Alunos</a>
        <a href="cursos.html">Cursos</a>
        <a href="cidades.html" class="active">Cidades</a>
      </nav>
    </aside>

    <div class="content">
      <header class="header">
        <div></div>
        <button class="signout">Sign out</button>
      </header>

      <main class="main">
        <div class="card">
          <div class="toolbar" style="justify-content:space-between; align-items:center;">
            <h1 class="h1" style="margin:0">Lista de Cidades</h1>
            <button class="btn btn-green">Novo Cadastro</button>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Sigla</th>
                  <th style="text-align:right;">Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Sousa</td>
                  <td>PB</td>
                  <td style="text-align:right;">
                    <div class="actions" style="justify-content:flex-end;">
                      <button class="btn btn-blue">Editar</button>
                      <button class="btn btn-red">Remover</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>Pau dos Ferros</td>
                  <td>RN</td>
                  <td style="text-align:right;">
                    <div class="actions" style="justify-content:flex-end;">
                      <button class="btn btn-blue">Editar</button>
                      <button class="btn btn-red">Remover</button>
                    </div>
                  </td>
                </tr>
                <!-- Adicione mais cidades aqui -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
