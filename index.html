<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Matrículas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 font-sans leading-normal tracking-normal">

    <div class="flex h-screen">

        <aside class="w-64 bg-gray-900 text-gray-200">
            <div class="p-4 text-2xl font-bold">
                IFPB - 4º Ano
            </div>
            <nav class="mt-8">
                <a href="index.html" class="block py-2.5 px-4 rounded transition duration-200 bg-gray-700 text-white">
                    Dashboard
                </a>
                <a href="alunos.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700 hover:text-white">
                    Alunos
                </a>
                <a href="cursos.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700 hover:text-white">
                    Cursos
                </a>
                <a href="cidades.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700 hover:text-white">
                    Cidades
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex justify-between items-center p-4 bg-gray-900 border-b border-gray-700">
                <div>
                    </div>
                <div>
                    <button class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">Sign out</button>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-8 bg-gray-100">
                <h1 class="text-3xl font-bold text-gray-800 mb-8">Dashboard</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <!-- Card: Alunos -->
                    <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center">
                        <div class="text-4xl font-bold text-blue-600 mb-2">320</div>
                        <div class="text-lg font-semibold text-gray-700">Alunos</div>
                        <div class="mt-2 text-gray-500">Total de alunos matriculados</div>
                    </div>
                    <!-- Card: Cursos -->
                    <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center">
                        <div class="text-4xl font-bold text-green-600 mb-2">12</div>
                        <div class="text-lg font-semibold text-gray-700">Cursos</div>
                        <div class="mt-2 text-gray-500">Cursos disponíveis</div>
                    </div>
                    <!-- Card: Cidades -->
                    <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center">
                        <div class="text-4xl font-bold text-purple-600 mb-2">8</div>
                        <div class="text-lg font-semibold text-gray-700">Cidades</div>
                        <div class="mt-2 text-gray-500">Cidades atendidas</div>
                    </div>
                </div>
			</main>

        </div>

    </div>

</body>
</html>
