<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Matrículas</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">IFPB - 4º Ano</div>
      <nav class="nav">
        <a href="index.html" class="active">Dashboard</a>
        <a href="alunos.html">Alunos</a>
        <a href="cursos.html">Cursos</a>
        <a href="cidades.html">Cidades</a>
      </nav>
    </aside>

    <div class="content">
      <header class="header">
        <div></div>
        <button class="signout">Sign out</button>
      </header>

      <main class="main">
        <h1 class="h1 mb-24">Dashboard</h1>
        <div class="stats">
          <div class="stat">
            <div class="big" style="color:#2563eb">320</div>
            <div class="label">Alunos</div>
            <div class="sub">Total de alunos matriculados</div>
          </div>
          <div class="stat">
            <div class="big" style="color:#16a34a">12</div>
            <div class="label">Cursos</div>
            <div class="sub">Cursos disponíveis</div>
          </div>
          <div class="stat">
            <div class="big" style="color:#7c3aed">8</div>
            <div class="label">Cidades</div>
            <div class="sub">Cidades atendidas</div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
